name: Daily commit watchdog

on:
  schedule:
    # Runs every 15 minutes. The script chooses a deterministic random delay
    # between commits, caps daily commits, and keeps the gap below 20h.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      force_commit:
        description: "Create a heartbeat commit even if the last commit is recent"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-commit-watchdog
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    env:
      RANDOM_MIN_MINUTES_BETWEEN_COMMITS: "240"
      RANDOM_MAX_MINUTES_BETWEEN_COMMITS: "480"
      BOOST_RANDOM_MIN_MINUTES_BETWEEN_COMMITS: "120"
      BOOST_RANDOM_MAX_MINUTES_BETWEEN_COMMITS: "360"
      BOOST_FIXED_DATES: "01-01,04-21,05-01,09-07,10-12,11-02,11-15,11-20,12-25"
      BOOST_DATES: ""
      SAFETY_MAX_MINUTES_WITHOUT_COMMIT: "1200"
      MAX_COMMITS_PER_DAY: "10"
      COMMIT_DAY_TIMEZONE: "America/Sao_Paulo"
      HEARTBEAT_FILE: ".daily-commit/heartbeat.json"
      SOURCE_TEXT_FILE: "meu roteiro.txt"
      OUTPUT_TEXT_FILE: "roteiro.md"
      WORD_STATE_FILE: ".daily-commit/word-state.json"
      TARGET_BRANCH: ${{ github.ref_name }}
      FORCE_COMMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.force_commit || false }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create commit when needed
        run: go run ./scripts/daily_commit.go
